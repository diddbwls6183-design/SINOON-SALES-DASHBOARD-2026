.h-chip .hv{font-size:22px;font-weight:700;display:block;line-height:1.15;}
.h-chip .hv.pos{color:#5de8a0;}
.h-chip .hv.neg{color:#ff8888;}
.h-chip .hv.warn{color:#ffd060;}
.h-chip .hs{font-size:11px;opacity:.55;display:block;margin-top:4px;}
.tabs{background:#fff;border-bottom:1px solid var(--border);padding:0 28px;display:flex;gap:0;position:sticky;top:0;z-index:100;}
.tab-btn{padding:14px 20px;border:none;background:none;cursor:pointer;font-size:14px;font-family:inherit;color:var(--sub);border-bottom:3px solid transparent;transition:.2s;}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600;}
.tab-content{display:none;padding:24px 28px;max-width:1600px;margin:0 auto;}
.tab-content.active{display:block;}
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:20px;}
.card-title{font-size:13px;font-weight:600;color:var(--sub);margin-bottom:16px;display:flex;align-items:center;gap:6px;}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}
.grid-auto{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;margin-bottom:16px;}
.filter-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;align-items:center;}
.filter-label{font-size:12px;color:var(--sub);margin-right:4px;white-space:nowrap;}
.pill{border:1px solid var(--border);border-radius:20px;padding:5px 14px;background:#fff;cursor:pointer;font-size:12px;font-family:inherit;color:var(--text);transition:.15s;}

.pill.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.toggle-group{display:flex;border:1px solid var(--border);border-radius:20px;overflow:hidden;background:#fff;}
.toggle-btn{padding:6px 16px;border:none;background:none;cursor:pointer;font-size:12px;font-family:inherit;color:var(--sub);transition:.15s;}
.toggle-btn.active{background:var(--accent);color:#fff;}

.ch-card-header{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.ch-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.ch-card-name{font-weight:600;font-size:14px;}
.ch-card-body{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.ch-stat{font-size:11px;color:var(--sub);}
.ch-stat span{display:block;font-size:13px;font-weight:600;color:var(--text);}
.progress-bar{height:6px;background:#eee;border-radius:3px;overflow:hidden;margin-bottom:4px;}
.progress-fill{height:100%;border-radius:3px;transition:.3s;}
.progress-pct{font-size:11px;display:flex;justify-content:space-between;}
.tbl-wrap{overflow-x:auto;border-radius:8px;border:1px solid var(--border);}
table{border-collapse:collapse;width:100%;font-size:12px;white-space:nowrap;}
thead th{background:#f5f4f2;padding:8px 12px;text-align:center;font-weight:600;color:var(--sub);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:2;}
thead th:first-child{text-align:left;position:sticky;left:0;z-index:3;background:#f5f4f2;}
tbody td{padding:7px 12px;text-align:center;border-bottom:1px solid #f0eeec;font-size:12px;}
tbody td:first-child{text-align:left;position:sticky;left:0;background:#fff;z-index:1;}
tbody tr:hover td{background:#faf9f7;}
tbody tr:last-child td{}
.sum-col{background:#f0eeeb!important;}
.pos-val{color:var(--pos);}
.neg-val{color:var(--neg);}
.chart-wrap{position:relative;height:240px;}
.chart-wrap-md{position:relative;height:260px;}
.section-title{font-size:15px;font-weight:700;margin-bottom:0;display:flex;align-items:center;gap:8px;}

.inner-tab{padding:4px 12px;border-radius:20px;border:1px solid var(--border);background:#fff;cursor:pointer;font-size:12px;font-family:inherit;}

.tbl-wrap{-webkit-overflow-scrolling:touch;}
body{-webkit-text-size-adjust:100%;}

function wkLabel(w){

  const fmt=d=>{const p=d.slice(5).replace('-','/');return p.replace(/^0/,'');};
  return w+' ('+fmt(dates[0])+'~'+fmt(dates[dates.length-1])+')';
}
function won(n){return (n||0).toLocaleString('ko-KR')+'원';}
function wonShort(n){n=n||0;if(Math.abs(n)>=100000000)return (n/100000000).toFixed(1)+'억원';if(Math.abs(n)>=10000)return Math.round(n/10000)+'만원';return n.toLocaleString('ko-KR')+'원';}

function renderHeader(){
  const dataMons=MONTHS.filter(m=>hasMon(m));
  const ytdS=dataMons.reduce((acc,m)=>acc+CH_NAMES.reduce((a,ch)=>a+m26s(m,ch),0),0);
  const ytdR=dataMons.reduce((acc,m)=>acc+CH_NAMES.reduce((a,ch)=>a+m26r(m,ch),0),0);
  const net=ytdS-ytdR;
  // 반품률: 해당 월(CUR_MON) 기준
  const curMonS=CH_NAMES.reduce((a,ch)=>a+m26s(CUR_MON,ch),0);
  const curMonR=CH_NAMES.reduce((a,ch)=>a+m26r(CUR_MON,ch),0);
  const retRate=curMonS?(curMonR/curMonS*100).toFixed(1):0;
  const tgtSum=CH_NAMES.reduce((acc,ch)=>acc+dataMons.reduce((a,m)=>a+(D.targets[ch]?D.targets[ch][m]||0:0),0),0);
  const achRate=D.annual_target?(net/D.annual_target*100).toFixed(1):0;
  // YoY 동기간 일단위: 매출목표탭과 동일 방식 (net 순매출 vs daily25 cutoff)
  const lastDate26=D.dates&&D.dates.length?D.dates[D.dates.length-1]:'';
  const cutoff25=lastDate26.replace(/^2026/,'2025');
  const ytd25=cutoff25?CH_NAMES.reduce((acc,ch)=>acc+Object.entries(D.daily25||{}).reduce((a,[dt,v])=>{
    if(dt<=cutoff25)a+=(v[ch]||0);return a;
  },0),0):0;
  const yoy=ytd25?((net-ytd25)/ytd25*100).toFixed(1):0;
  const yoySign=parseFloat(yoy)>=0?'▲':'▼';
  const chips=[
    {hl:'온라인 연목표', hv:wonShort(D.annual_target), hs:D.annual_target.toLocaleString('ko-KR')+'원', cls:''},
    {hl:'실적',         hv:wonShort(net),               hs:net.toLocaleString('ko-KR')+'원', cls:''},
    {hl:'반품률',   hv:retRate+'%',                 hs:CUR_MON+' 기준', cls:parseFloat(retRate)>20?'neg':parseFloat(retRate)>15?'warn':''},
    {hl:'목표 달성률', hv:achRate+'%',     hs:'연목표 '+wonShort(D.annual_target), cls:parseFloat(achRate)>=100?'pos':parseFloat(achRate)>=80?'warn':'neg'},
    {hl:'YOY 신장률', hv:yoySign+Math.abs(yoy)+'%', hs:'vs 2025 동기', cls:parseFloat(yoy)>=0?'pos':'neg'},
  ];
  document.getElementById('header-chips').innerHTML=chips.map(c=>`<div class="h-chip"><span class="hl">${c.hl}</span><span class="hv ${c.cls}">${c.hv}</span><span class="hs">${c.hs}</span></div>`).join('');
}

  const totAnnTgt=ALL_CH.reduce((a,ch)=>a+chAnnTgt(ch),0);
  const totYtd26=ALL_CH.reduce((a,ch)=>a+chYtd26(ch),0);
  const totAnn25=ALL_CH.reduce((a,ch)=>a+chAnn25(ch),0);
  const annAch=totAnnTgt?totYtd26/totAnnTgt*100:0;
  const annFc=annAch>=100?'#1e7a4a':annAch>=50?'#d4830a':'#c0392b';

  const BD='border:1px solid #d4c9bc;';
  /* 연간 테이블 셀: 모두 center, vertical-align middle */
  const TH_S=`padding:10px 8px;text-align:center;vertical-align:middle;font-weight:600;color:#5a4a3a;font-size:11px;${BD}`;
  const TD_C=`padding:10px 8px;text-align:center;vertical-align:middle;${BD}`;
  const TD_L=`padding:10px 12px;text-align:center;vertical-align:middle;${BD}`;

  const annRows=ALL_CH.map(ch=>{
    const tgt=chAnnTgt(ch),n26=chYtd26(ch),n25=chAnn25(ch);
    const ach=tgt?n26/tgt*100:0;
    const yoy=n25?((n26-n25)/n25*100):null;
    const achFc=ach>=100?'#1e7a4a':ach>=50?'#d4830a':'#c0392b';
    const yoyFc=yoy===null?'#bbb':yoy>=0?'#1e7a4a':'#c0392b';
    const yoyTxt=yoy===null?'-':(yoy>=0?'+':'')+yoy.toFixed(1)+'%';
    return`<tr>
      <td style="${TD_L}font-weight:600;color:#2d2926">
        <div style="display:flex;align-items:center;justify-content:center;gap:6px">
          <div style="width:8px;height:8px;border-radius:50%;background:${CH_COLORS[ch]||'#8b6f5e'};flex-shrink:0"></div>${dn(ch)}
        </div>
      </td>
      <td style="${TD_C}color:#5a4a3a">${tgt?won(tgt):'-'}</td>
      <td style="${TD_C}color:#777">${n25?won(n25):'-'}</td>
      <td style="${TD_C}color:#c0392b;font-weight:600">${n26?won(n26):'-'}</td>
      <td style="${TD_C}font-weight:700;color:${achFc}">${tgt?ach.toFixed(1)+'%':'-'}</td>
      <td style="${TD_C}font-weight:700;color:${yoyFc}">${yoyTxt}</td>
    </tr>`;
  });

  const totAch=totAnnTgt?totYtd26/totAnnTgt*100:0;
  const totFc=totAch>=100?'#1e7a4a':totAch>=50?'#d4830a':'#c0392b';
  const totYoy=totAnn25?((totYtd26-totAnn25)/totAnn25*100):null;
  const totYoyFc=totYoy===null?'#bbb':totYoy>=0?'#1e7a4a':'#c0392b';
  const totYoyTxt=totYoy===null?'-':(totYoy>=0?'+':'')+totYoy.toFixed(1)+'%';

  const availMons=MONTHS.filter(m=>D.month_to_weeks[m]);

  function renderDailyTgt(){
    const mon=window.tgtSt.mon;
    const DAYS=['일','월','화','수','목','금','토'];

    /* 선택 월 prefix */
    const MON_NUM_IDX=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'].indexOf(mon);
    const monPrefix='2026-'+(MON_NUM_IDX+1+'').padStart(2,'0');

    /* 7월 이후 NUGU_일본 제외 */
    const DISP_CH=MON_NUM_IDX>=6?ALL_CH.filter(ch=>ch!=='NUGU_일본'):ALL_CH;
    const IS_NUGU=(ch)=>ch==='NUGU_일본';

    const BG_HEADER='#EEE1E7';
    const BG_NUGU='#B7B7B7';
    const BG_SUM_COL='#FFF2CC';
    const BG_TGT='#FFFFFF';
    const BG_ACT='#EFEFEF';
    const BG_PCT='#D9D9D9';
    const BG_WK_TGT='#EAD1DC';
    const BG_WK_ACT='#E9BDD2';
    const BG_WK_PCT='#D89FBD';
    const BD='1px solid #333333';
    const BD2='2px solid #000000';

    function fmt(v){if(!v&&v!==0)return'';if(v===0)return'0';return Math.round(v).toLocaleString();}
    function pct(p,hasTgt){if(!hasTgt)return'-';return Math.round(p*100)+'%';}

    function monChTgt(ch){return D.targets[ch]?D.targets[ch][mon]||0:0;}
    function monChAct(ch){return m26s(mon,ch)-m26r(mon,ch);}
    const totMTgt=DISP_CH.reduce((a,ch)=>a+monChTgt(ch),0);
    const totMAct=DISP_CH.reduce((a,ch)=>a+monChAct(ch),0);

    const CS=(bg,extra='')=>`border:${BD};padding:4px 5px;text-align:center;vertical-align:middle;font-size:11px;background:${bg};${extra}`;

    /* ── 전체 주차에서 "실제 날짜가 해당 월"인 날짜만 수집 → 주차별 그룹핑 ── */
    const allWkKeys=Object.keys(D.week_to_dates).sort((a,b)=>{
      const da=(D.week_to_dates[a]||[])[0]||'';
      const db=(D.week_to_dates[b]||[])[0]||'';
      return da.localeCompare(db);
    });
    /* 해당 월 + 평일인 날짜만, 주차별로 그룹 */
    const wkGroups=[];
    allWkKeys.forEach(wk=>{
      const dates=(D.week_to_dates[wk]||[]).filter(d=>{
        if(!d.startsWith(monPrefix))return false;
        const dow=new Date(d).getDay();
        return dow!==0&&dow!==6;
      });
      if(dates.length>0) wkGroups.push({wk,dates});
    });

    let html=`<div style="overflow-x:auto">
    <table style="border-collapse:collapse;font-size:11px;border:${BD2};width:100%">
    <tbody>
    <tr>
      <td style="${CS(BG_HEADER,'font-weight:700;border:2px solid #AAAAAA')}" colspan="2">2026</td>
      <td style="${CS(BG_HEADER,'font-weight:700')}">구분</td>`;
    DISP_CH.forEach(ch=>{
      const bg=IS_NUGU(ch)?BG_NUGU:BG_HEADER;
      html+=`<td style="${CS(bg,'font-weight:700;min-width:88px')}">${dn(ch)}</td>`;
    });
    html+=`<td style="${CS(BG_HEADER,'font-weight:700')}">합계</td></tr>

    <tr>
      <td style="${CS('','font-weight:700;color:#FF0000')}" colspan="3">월 목표</td>`;
    DISP_CH.forEach(ch=>{
      const t=monChTgt(ch);
      const bg=IS_NUGU(ch)?BG_NUGU:'';
      html+=`<td style="${CS(bg,'font-weight:700;color:#FF0000')}">${fmt(t)||'0'}</td>`;
    });
    html+=`<td style="${CS(BG_SUM_COL,'font-weight:700;color:#FF0000')}">${fmt(totMTgt)}</td></tr>

    <tr>
      <td style="${CS('','font-weight:700;color:#0000FF')}" colspan="3">달성</td>`;
    DISP_CH.forEach(ch=>{
      const a=monChAct(ch);
      const bg=IS_NUGU(ch)?BG_NUGU:'';
      html+=`<td style="${CS(bg,'font-weight:700;color:#0000FF')}">${fmt(a)}</td>`;
    });
    html+=`<td style="${CS(BG_SUM_COL,'font-weight:700;color:#0000FF')}">${fmt(totMAct)}</td></tr>

    <tr>
      <td style="${CS('','font-weight:700')}" colspan="3">달성율</td>`;
    DISP_CH.forEach(ch=>{
      const t=monChTgt(ch),a=monChAct(ch),p=t?a/t:null;
      const bg=IS_NUGU(ch)?BG_NUGU:'';
      html+=`<td style="${CS(bg,'font-weight:700')}">${pct(p,t)}</td>`;
    });
    const tp=totMTgt?totMAct/totMTgt:null;
    html+=`<td style="${CS(BG_SUM_COL,'font-weight:700')}">${pct(tp,totMTgt)}</td></tr>

    <tr><td colspan="${3+DISP_CH.length+1}" style="height:2px;background:#AAAAAA;padding:0;border:none"></td></tr>`;

    let ownWkIdx=0;
    wkGroups.forEach(({wk,dates})=>{
      /* 해당 월 소속 주차 → 순번(1주차…), 타 월 → 원래 주차명(5월4주차 등) */
      const isOwnMonth=wk.startsWith(mon);
      let wkN;
      if(isOwnMonth){ownWkIdx++;wkN=ownWkIdx+'주차';}
      else{wkN=wk+'차';}

      const wkT={},wkA={};
      DISP_CH.forEach(ch=>{wkT[ch]=0;wkA[ch]=0;});
      dates.forEach(d=>{
        const tgt=D.daily_target[d]||{},act=D.daily26[d]||{};
        DISP_CH.forEach(ch=>{wkT[ch]+=tgt[ch]||0;wkA[ch]+=(act[ch]?.s||0)-(act[ch]?.r||0);});
      });
      const wkTT=DISP_CH.reduce((a,ch)=>a+wkT[ch],0);
      const wkTA=DISP_CH.reduce((a,ch)=>a+wkA[ch],0);

      dates.forEach(d=>{
        const tgt=D.daily_target[d]||{},act=D.daily26[d]||{};
        const hasAct=hasData(d);
        const dp=d.slice(5).replace('-','/');
        const di=new Date(d).getDay();
        const day=DAYS[di];
        const noTgt=DISP_CH.every(ch=>!(tgt[ch]||0));
        const dateFc=noTgt?'color:#FF0000':'';
        const opac=!hasAct?'opacity:0.6;':'';

        let tgtRow=`<tr style="${opac}">
          <td style="${CS(BG_TGT,'font-weight:400;'+dateFc)}" rowspan="3">${dp}</td>
          <td style="${CS(BG_TGT,'font-weight:400;'+dateFc)}" rowspan="3">${day}</td>
          <td style="${CS(BG_TGT,'font-weight:400')}">목표</td>`;
        DISP_CH.forEach(ch=>{
          const t=tgt[ch]||0;
          const bg=IS_NUGU(ch)?BG_NUGU:BG_TGT;
          tgtRow+=`<td style="${CS(bg,'')}">${fmt(t)||'0'}</td>`;
        });
        const rTotT=DISP_CH.reduce((a,ch)=>a+(tgt[ch]||0),0);
        tgtRow+=`<td style="${CS(BG_TGT,'')}">${fmt(rTotT)||'0'}</td></tr>`;

        let actRow=`<tr style="${opac}">
          <td style="${CS(BG_ACT,'font-weight:400')}">달성</td>`;
        DISP_CH.forEach(ch=>{
          const s=(act[ch]?.s||0)-(act[ch]?.r||0);
          const bg=IS_NUGU(ch)?BG_NUGU:BG_ACT;
          const fc=s<0?'color:#FF0000':'';
          actRow+=`<td style="${CS(bg,fc)}">${hasAct?fmt(s):''}</td>`;
        });
        const rTotA=DISP_CH.reduce((a,ch)=>a+(act[ch]?.s||0)-(act[ch]?.r||0),0);
        const rTotFc=rTotA<0?'color:#FF0000':'';
        actRow+=`<td style="${CS(BG_ACT,rTotFc)}">${hasAct?fmt(rTotA):''}</td></tr>`;

        let pctRow=`<tr style="${opac}">
          <td style="${CS(BG_PCT,'font-weight:700')}">달성율</td>`;
        DISP_CH.forEach(ch=>{
          const t=tgt[ch]||0,s=(act[ch]?.s||0)-(act[ch]?.r||0);
          const p=t?s/t:null;
          const bg=IS_NUGU(ch)?BG_NUGU:BG_PCT;
          pctRow+=`<td style="${CS(bg,'font-weight:700')}">${hasAct?pct(p,t):'-'}</td>`;
        });
        const rTotP=rTotT?rTotA/rTotT:null;
        pctRow+=`<td style="${CS(BG_PCT,'font-weight:700')}">${hasAct?pct(rTotP,rTotT):'-'}</td></tr>`;

        html+=tgtRow+actRow+pctRow;
      });

      /* 주차 합계 - wkN(rowspan=3) + 합(rowspan=3) 분리 */
      let wkTgtRow=`<tr>
        <td style="${CS(BG_WK_TGT,'font-weight:700')}" rowspan="3">${wkN}</td>
        <td style="${CS(BG_WK_TGT,'font-weight:700')}" rowspan="3">합</td>
        <td style="${CS(BG_WK_TGT,'font-weight:700')}">목표</td>`;
      DISP_CH.forEach(ch=>{
        const bg=IS_NUGU(ch)?BG_NUGU:BG_WK_TGT;
        wkTgtRow+=`<td style="${CS(bg,'font-weight:700')}">${fmt(wkT[ch])||'0'}</td>`;
      });
      wkTgtRow+=`<td style="${CS(BG_WK_TGT,'font-weight:700')}">${fmt(wkTT)}</td></tr>`;

      let wkActRow=`<tr>
        <td style="${CS(BG_WK_ACT,'font-weight:700')}">달성</td>`;
      DISP_CH.forEach(ch=>{
        const bg=IS_NUGU(ch)?BG_NUGU:BG_WK_ACT;
        const fc=wkA[ch]<0?'color:#FF0000':'';
        wkActRow+=`<td style="${CS(bg,'font-weight:700;'+fc)}">${fmt(wkA[ch])}</td>`;
      });
      const wkTAFc=wkTA<0?'color:#FF0000':'';
      wkActRow+=`<td style="${CS(BG_WK_ACT,'font-weight:700;'+wkTAFc)}">${fmt(wkTA)}</td></tr>`;

      let wkPctRow=`<tr>
        <td style="${CS(BG_WK_PCT,'font-weight:700')}">달성율</td>`;
      DISP_CH.forEach(ch=>{
        const t=wkT[ch],a=wkA[ch],p=t?a/t:null;
        const bg=IS_NUGU(ch)?BG_NUGU:BG_WK_PCT;
        wkPctRow+=`<td style="${CS(bg,'font-weight:700')}">${pct(p,t)}</td>`;
      });
      const wkP=wkTT?wkTA/wkTT:null;
      wkPctRow+=`<td style="${CS(BG_WK_PCT,'font-weight:700')}">${pct(wkP,wkTT)}</td></tr>
      <tr><td colspan="${3+DISP_CH.length+1}" style="height:2px;background:#AAAAAA;padding:0;border:none"></td></tr>`;

      html+=wkTgtRow+wkActRow+wkPctRow;
    });

    html+=`</tbody></table></div>`;
    document.getElementById('tgt-daily-wrap').innerHTML=html;
  }

  el.innerHTML=`
  <div class="card" style="margin-bottom:24px">
    <div class="card-title" style="margin-bottom:18px">📅 26년 목표 vs 실적 <span style="font-size:11px;color:#999;font-weight:400">(순매출 기준 · ${dataMons.join(', ')} 반영)</span></div>
    <div style="padding:20px 24px;background:#f9f7f5;border-radius:10px;margin-bottom:18px">
      <div style="text-align:center;margin-bottom:12px">
        <span style="font-size:19px;color:#1a4a8a;font-weight:700">연목표 ${won(D.annual_target)}</span>
      </div>
      <div style="height:12px;background:#e8e0d8;border-radius:6px;overflow:hidden;margin-bottom:10px">
        <div style="width:${Math.min(100,annAch).toFixed(1)}%;height:100%;background:${annFc};border-radius:6px"></div>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:baseline">
        <span style="font-size:13px;font-weight:700;color:#c0392b">실적 ${won(totYtd26)}</span>
        <span style="font-size:14px;font-weight:700;color:${annFc}">${annAch.toFixed(1)}% 달성</span>
        <span style="font-size:11px;color:#999">잔여목표 ${won(D.annual_target-totYtd26)}</span>
      </div>
    </div>
    <table style="width:100%;border-collapse:collapse;font-size:12px;border:2px solid #2d2926;table-layout:fixed">
      <colgroup>
        <col style="width:15%">
        <col style="width:17%">
        <col style="width:17%">
        <col style="width:17%">
        <col style="width:17%">
        <col style="width:17%">
      </colgroup>
      <thead><tr style="background:#f5f2ef">
        <th style="${TH_S}background:#ede9e4">채널</th>
        <th style="${TH_S}">연목표</th>
        <th style="${TH_S}">25년 동기 실적</th>
        <th style="${TH_S}">26년 YTD</th>
        <th style="${TH_S}">달성률</th>
        <th style="${TH_S}">신장률(동기간)</th>
      </tr></thead>
      <tbody>${annRows.join('')}
      <tr style="background:#f5f2ef;border-top:2px solid #2d2926;font-weight:700">
        <td style="${TD_L}background:#ede9e4">합계</td>
        <td style="${TD_C}">${won(totAnnTgt)}</td>
        <td style="${TD_C}color:#777">${totAnn25?won(totAnn25):'-'}</td>
        <td style="${TD_C}color:#c0392b">${won(totYtd26)}</td>
        <td style="${TD_C}color:${totFc}">${totAnnTgt?totAch.toFixed(1)+'%':'-'}</td>
        <td style="${TD_C}color:${totYoyFc}">${totYoyTxt}</td>
      </tr></tbody>
    </table>
  </div>

  <div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px">
      <div class="card-title">📋 일별 매출 목표 · 실적 <span style="font-size:11px;color:#999;font-weight:400">(단위: 만원)</span></div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        ${availMons.map(m=>`<button class="pill ${window.tgtSt.mon===m?'active':''}" onclick="window.tgtSt.mon='${m}';renderTabTarget()">${m}</button>`).join('')}
      </div>
    </div>
    <div id="tgt-daily-wrap"></div>
  </div>`;

  renderDailyTgt();
}

// ── 프로모션 메모 시스템 ──
var MEMO_PIN='1111'; // MD 수정 비밀번호
var MEMO_UNLOCKED=false;

// localStorage에서 메모 로드
function memoLoad(){
  try{return JSON.parse(localStorage.getItem('sinoon_promo_memos')||'{}');}
  catch(e){return{};}
}
function memoSave(store){
  try{localStorage.setItem('sinoon_promo_memos',JSON.stringify(store));}catch(e){}
}
function memoKey(p){return p.ch+'||'+p.name+'||'+p.period;}

// PIN 확인 모달
function memoUnlock(cb){
  if(MEMO_UNLOCKED){cb();return;}
  var pin=prompt('MD 수정 비밀번호를 입력하세요:');
  if(pin===MEMO_PIN){MEMO_UNLOCKED=true;cb();}
  else if(pin!==null){alert('비밀번호가 올바르지 않습니다.');}
}

// 메모 수정 모드 진입
function promoEditMode(idx){
  memoUnlock(function(){
    var disp=document.getElementById('pmemo-disp-'+idx);
    var editArea=document.getElementById('pmemo-edit-'+idx);
    var editBtn=document.getElementById('pmemo-editbtn-'+idx);
    if(disp)disp.style.display='none';
    if(editArea)editArea.style.display='block';
    if(editBtn)editBtn.style.display='none';
  });
}

// 메모 저장
function promoSaveMemo(idx){
  var ta=document.getElementById('pmemo-ta-'+idx);
  var disp=document.getElementById('pmemo-disp-'+idx);
  var editArea=document.getElementById('pmemo-edit-'+idx);
  var editBtn=document.getElementById('pmemo-editbtn-'+idx);
  if(!ta)return;
  var val=ta.value.trim();
  var key=ta.dataset.key;
  // localStorage 저장
  var store=memoLoad();
  store[key]=val;
  memoSave(store);
  // PROMO_DATA 메모 업데이트 (인메모리)
  for(var i=0;i<PROMO_DATA.length;i++){
    if(memoKey(PROMO_DATA[i])===key){PROMO_DATA[i].memo=val;break;}
  }
  // 화면 업데이트
  if(disp){
    disp.innerHTML=val
      ?val.replace(/\n/g,'<br>')
      :'<span style="color:#bbb;font-size:11px;">메모 없음</span>';
    disp.style.display='block';
  }
  if(editArea)editArea.style.display='none';
  if(editBtn)editBtn.style.display='inline-flex';
  // 저장 확인 토스트
  var toast=document.createElement('div');
  toast.textContent='저장완료 ✓';
  toast.style.cssText='position:fixed;bottom:30px;right:30px;background:#2c2c2c;color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;z-index:9999;opacity:1;transition:opacity 0.5s';
  document.body.appendChild(toast);
  setTimeout(function(){toast.style.opacity='0';setTimeout(function(){toast.remove();},500);},1800);
}

// 메모 취소
function promoCancelMemo(idx){
  var disp=document.getElementById('pmemo-disp-'+idx);
  var editArea=document.getElementById('pmemo-edit-'+idx);
  var editBtn=document.getElementById('pmemo-editbtn-'+idx);
  if(disp)disp.style.display='block';
  if(editArea)editArea.style.display='none';
  if(editBtn)editBtn.style.display='inline-flex';
}

function s0Promo(){
  var el=document.getElementById('s0promo');
  if(!el)return;
  if(typeof s4LoadEdits==='function')s4LoadEdits(); // 리뷰탭 편집내용 반영
  var now=new Date();
  var todayVal=now.getFullYear()*10000+(now.getMonth()+1)*100+now.getDate();
  var memoStore=memoLoad();

  var active=PROMO_DATA.filter(function(p){
    if(!p.parsed)return false;
    var sVal=2026*10000+p.parsed.sm*100+p.parsed.sd;
    var eVal=2026*10000+p.parsed.em*100+p.parsed.ed;
    return todayVal>=sVal&&todayVal<=eVal;
  });

  if(!active.length){
    el.innerHTML='<div style="padding:16px;color:#999;text-align:center;font-size:13px;">현재 진행중인 프로모션이 없습니다.</div>';
    return;
  }

  var rows='';
  for(var i=0;i<active.length;i++){
    var p=active[i];
    var mk=memoKey(p);
    // localStorage 우선, 없으면 PROMO_DATA.memo
    // review_h 우선(리뷰탭 데이터), 없으면 memoStore, 없으면 빈 상태
    var reviewH=p.review_h||'';
    var memoPlain=(memoStore[mk]!==undefined)?memoStore[mk]:'';
    var memoDispHtml;
    if(reviewH){
      memoDispHtml='<div style="white-space:pre-wrap;word-break:break-word;overflow-wrap:break-word;font-size:12px;line-height:1.8;color:#2c2c2c;">'+reviewH+'</div>';
    }else if(memoPlain){
      memoDispHtml=memoPlain.replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
    }else{

function buildDonut(){
  destroyChart('c0donut');
  const g=s0.donutGran;
  const chs=s0.donutChs.length?s0.donutChs:CH_NAMES;
  let nets;
  if(g==='연간'){
    nets=chs.map(ch=>Math.max(0,MONTHS.reduce((a,m)=>a+m26s(m,ch),0)-MONTHS.reduce((a,m)=>a+m26r(m,ch),0)));
  } else if(g==='월별'){
    const m=s0.donutSelMon||CUR_MON;
    nets=chs.map(ch=>Math.max(0,m26s(m,ch)-m26r(m,ch)));
  } else {
    const w=s0.donutSelWk||(D.month_to_weeks[s0.donutSelMon||CUR_MON]||[]).slice(-1)[0]||'';
    nets=chs.map(ch=>Math.max(0,(D.weekly26[w]?D.weekly26[w][ch]?D.weekly26[w][ch].s||0:0:0)-(D.weekly26[w]?D.weekly26[w][ch]?D.weekly26[w][ch].r||0:0:0)));
  }
  const total=nets.reduce((a,b)=>a+b,0);
  const donutPctPlugin={
    id:'donutPct',
    afterDatasetsDraw(chart){
      const {ctx,data}=chart;
      const meta=chart.getDatasetMeta(0);
      const tot=data.datasets[0].data.reduce((a,b)=>a+(b||0),0);
      meta.data.forEach((arc,i)=>{
        const val=data.datasets[0].data[i]||0;
        const pct=tot?(val/tot*100):0;
        if(pct<3)return;
        const pos=arc.tooltipPosition(false);
        ctx.save();
        ctx.fillStyle='#fff';
        ctx.font='bold 11px sans-serif';
        ctx.textAlign='center';
        ctx.textBaseline='middle';
        ctx.shadowColor='rgba(0,0,0,.3)';
        ctx.shadowBlur=3;
        ctx.fillText(pct.toFixed(1)+'%',pos.x,pos.y);
        ctx.restore();
      });
    }
  };
  chartInstances['c0donut']=new Chart(document.getElementById('c0donut'),{
    type:'doughnut',
    data:{
      labels:chs,
      datasets:[{
        data:nets,
        backgroundColor:chs.map(c=>CH_COLORS[c]),
        borderWidth:2,
        borderColor:'#fff'
      }]
    },
    options:{
      responsive:true,
      maintainAspectRatio:false,
      plugins:{
        legend:{position:'right',labels:{font:{size:11},padding:10}},
        tooltip:{callbacks:{label:function(ctx){return ' '+won(ctx.raw)+' ('+(total?(ctx.raw/total*100).toFixed(1):0)+'%)';}}}
      }
    },
    plugins:[donutPctPlugin]
  });
}

function buildYoY(){
  destroyChart('c0yoy');
  const el=document.getElementById('c0yoy');if(!el)return;
  const mon=s0.rightMon||CUR_MON;
  const lbl=document.getElementById('right-yoy-label');
  if(lbl)lbl.textContent=mon+' 채널별 YoY 신장률';
  const chs=CH_NAMES;
  const labels=chs.map(ch=>dn(ch));
  const vals=chs.map(ch=>{
    if(s0.rightHiddenChs.includes(ch))return null;
    const v26=m26s(mon,ch),v25=m25s(mon,ch);
    return v25?parseFloat(((v26-v25)/v25*100).toFixed(1)):null;
  });
  const bgColors=chs.map((ch,i)=>{
    if(s0.rightHiddenChs.includes(ch))return '#d9d9d940';
    return vals[i]===null?'#ccc':vals[i]>=0?'#5a8a6a99':'#c0392b88';
  });
  const chart=new Chart(el,{
    type:'bar',
    data:{labels,datasets:[{label:'YoY %',data:vals,backgroundColor:bgColors,borderRadius:4}]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},
        datalabels:{display:true,anchor:'end',align:'top',
          formatter:(v,ctx)=>{
            if(s0.rightHiddenChs.includes(chs[ctx.dataIndex]))return '';
            return v===null?'-':v.toFixed(1)+'%';
          },
          color:(ctx)=>s0.rightHiddenChs.includes(chs[ctx.dataIndex])?'transparent':'#333',
          font:{size:10,weight:'bold'}}},
      scales:{
        y:{ticks:{callback:v=>v+'%'},grid:{color:'#f0eeec'},
          afterDataLimits:ax=>{ax.max=Math.max(ax.max,10);ax.min=Math.min(ax.min,-10);}},
        x:{grid:{display:false},
          ticks:{color:ctx=>s0.rightHiddenChs.includes(chs[ctx.index])?'#bbb':'#444'}}
      }}
  });
  chartInstances['c0yoy']=chart;

  /* ── 네이티브 canvas 클릭으로 x축 라벨 영역 감지 ──
     Chart.js 4는 onClick이 chartArea 내부만 작동하므로 직접 처리 */
  if(el._yoyHandler) el.removeEventListener('click',el._yoyHandler);
  if(el._yoyHover)   el.removeEventListener('mousemove',el._yoyHover);
  el._yoyHandler=function(e){
    const c=chartInstances['c0yoy'];if(!c)return;
    const rect=el.getBoundingClientRect();
    const cssX=e.clientX-rect.left;
    const cssY=e.clientY-rect.top;
    if(cssY>c.chartArea.bottom){
      const xAxis=c.scales.x;
      let nearestIdx=-1,minDist=Infinity;
      for(let i=0;i<chs.length;i++){
        const px=xAxis.getPixelForTick(i);
        const dist=Math.abs(cssX-px);
        if(dist<minDist){minDist=dist;nearestIdx=i;}
      }
      if(nearestIdx>=0&&minDist<120){
        const ch=chs[nearestIdx];
        const a=s0.rightHiddenChs,idx=a.indexOf(ch);
        if(idx>=0)a.splice(idx,1);else a.push(ch);
        buildYoY();
      }
    }
  };
  el._yoyHover=function(e){
    const c=chartInstances['c0yoy'];if(!c)return;
    const rect=el.getBoundingClientRect();
    const cssY=e.clientY-rect.top;
    el.style.cursor=cssY>c.chartArea.bottom?'pointer':'default';
  };
  el.addEventListener('click',el._yoyHandler);
  el.addEventListener('mousemove',el._yoyHover);
}

  if(g==='월별'){

    else{s0.selMonths=[lastMonth];}          // 재클릭 → 금월(최신월)만
  } else if(g==='주차별'){
    const wks=D.month_to_weeks[s0.wkMon]||[];
    const allSel=wks.every(w=>s0.selWeeks.includes(w));
    if(!allSel){s0.wkMon=lastMonth;s0.selWeeks=[...(D.month_to_weeks[lastMonth]||[])];}
    else{s0.wkMon=lastMonth;s0.selWeeks=[lastWeek];}  // 재클릭 → 금주
  } else {
    const ds=D.month_to_dates[s0.dyMon]||[];

    else{s0.dyMon=lastMonth;s0.selDays=[lastDay];}  // 재클릭 → 금일
  }
  s0Filter();s0Cards();
}

function buildAchGraph(){
  destroyChart('c0ach');
  const el=document.getElementById('c0ach');if(!el)return;
  const mon=s0.rightMon||CUR_MON;
  const lbl=document.getElementById('right-ach-label');
  if(lbl)lbl.textContent=mon+' 채널별 달성률';
  const chs=CH_NAMES;
  const labels=chs.map(ch=>dn(ch));
  const vals=chs.map(ch=>{
    if(s0.rightHiddenChs.includes(ch))return null;
    const net=m26s(mon,ch)-m26r(mon,ch);
    const tgt=D.targets[ch]?D.targets[ch][mon]||0:0;
    return tgt?parseFloat((net/tgt*100).toFixed(1)):null;
  });
  const bgColors=chs.map((ch,i)=>{
    if(s0.rightHiddenChs.includes(ch))return '#d9d9d940';
    return vals[i]===null?'#ccc':vals[i]>=100?'#5a8a6a99':vals[i]>=80?'#e6a23c88':'#c0392b88';
  });
  const chart=new Chart(el,{
    type:'bar',
    data:{labels,datasets:[{label:'달성률%',data:vals,backgroundColor:bgColors,borderRadius:4}]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},
        datalabels:{display:true,anchor:'end',align:'top',
          formatter:(v,ctx)=>{
            if(s0.rightHiddenChs.includes(chs[ctx.dataIndex]))return '';
            return v===null?'-':v.toFixed(1)+'%';
          },
          color:(ctx)=>s0.rightHiddenChs.includes(chs[ctx.dataIndex])?'transparent':'#333',
          font:{size:10,weight:'bold'}}},
      scales:{
        y:{ticks:{callback:v=>v+'%'},grid:{color:'#f0eeec'},
          afterDataLimits:ax=>{ax.max=Math.max(ax.max,110);ax.min=Math.min(ax.min,0);}},
        x:{grid:{display:false},
          ticks:{color:ctx=>s0.rightHiddenChs.includes(chs[ctx.index])?'#bbb':'#444'}}
      }}
  });
  chartInstances['c0ach']=chart;
  if(el._achHandler) el.removeEventListener('click',el._achHandler);
  if(el._achHover)   el.removeEventListener('mousemove',el._achHover);
  el._achHandler=function(e){
    const c=chartInstances['c0ach'];if(!c)return;
    const rect=el.getBoundingClientRect();
    const cssX=e.clientX-rect.left;
    const cssY=e.clientY-rect.top;
    if(cssY>c.chartArea.bottom){
      const xAxis=c.scales.x;
      let nearestIdx=-1,minDist=Infinity;
      for(let i=0;i<chs.length;i++){
        const px=xAxis.getPixelForTick(i);
        const dist=Math.abs(cssX-px);
        if(dist<minDist){minDist=dist;nearestIdx=i;}
      }
      if(nearestIdx>=0&&minDist<120){
        const ch=chs[nearestIdx];
        const a=s0.rightHiddenChs,idx=a.indexOf(ch);
        if(idx>=0)a.splice(idx,1);else a.push(ch);
        buildAchGraph();
      }
    }
  };
  el._achHover=function(e){
    const c=chartInstances['c0ach'];if(!c)return;
    const rect=el.getBoundingClientRect();
    const cssY=e.clientY-rect.top;
    el.style.cursor=cssY>c.chartArea.bottom?'pointer':'default';
  };
  el.addEventListener('click',el._achHandler);
  el.addEventListener('mousemove',el._achHover);
}
function s0GetData(ch){
  const g=s0.gran;let s26=0,s25=0,tgt=0;
  if(g==='월별'){
    const sel=s0.selMonths.length?s0.selMonths:MONTHS;
    sel.forEach(m=>{
      const v26=D.monthly26[m]?D.monthly26[m][ch]||{}:{};
      s26+=(v26.s||0)-(v26.r||0);
      if(hasMon(m)){s25+=m25s(m,ch);tgt+=D.targets[ch]?D.targets[ch][m]||0:0;}
    });
  } else if(g==='주차별'){
    const sel=s0.selWeeks.length?s0.selWeeks:D.month_to_weeks[s0.wkMon]||[];
    sel.forEach(w=>{
      const wDates=D.week_to_dates[w]||[];
      wDates.forEach(d=>{
        const v=D.daily26[d]?D.daily26[d][ch]||{}:{};
        s26+=(v.s||0)-(v.r||0);
        if(hasData(d)){s25+=sv(D.daily25[d.replace('2026','2025')],ch)||0;}
      });
      if(hasWeek(w)){tgt+=D.weekly_target[w]?D.weekly_target[w][ch]||0:0;}
    });
  } else {
    const sel=s0.selDays.length?s0.selDays:D.month_to_dates[s0.dyMon]||[];
    sel.forEach(d=>{
      const v=D.daily26[d]?D.daily26[d][ch]||{}:{};
      s26+=(v.s||0)-(v.r||0);
      if(hasData(d)){s25+=sv(D.daily25[d.replace('2026','2025')],ch)||0;tgt+=D.daily_target[d]?D.daily_target[d][ch]||0:0;}
    });
  }
  return{s26,s25,tgt};
}

function s1D(p,ch){

  const subCols=['판매','반품','순매출','YoY','목표','달성률'];
  const allPeriods=[...periods,'합계'];
  allPeriods.forEach((p,pi)=>{subCols.forEach(s=>{thead+=`<th style="${pi===allPeriods.length-1?'background:#ebe8e3':''}">${s}</th>`;});});
  thead+=`</tr></thead>`;
  
  let totals={};
  allPeriods.forEach(p=>{totals[p]={s26:0,r26:0,s25:0,tgt:0};});
  let rows='';
  chs.forEach(ch=>{
    let sumS=0,sumR=0,sumS25=0,sumTgt=0;
    let row=`<tr><td><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${CH_COLORS[ch]};margin-right:5px"></span>${dn(ch)}</td>`;
    periods.forEach(p=>{
      const{s26,r26,net,s25,tgt}=s1D(p,ch);
      sumS+=s26;sumR+=r26;sumS25+=s25;sumTgt+=tgt;
      totals[p].s26+=s26;totals[p].r26+=r26;totals[p].s25+=s25;totals[p].tgt+=tgt;
      const ach=tgt?((s26/tgt)*100).toFixed(1)+'%':'-';
      const yoy=yoyStr(s26,s25);const yc=yoyClass(s26,s25);
      row+=`<td>${won(s26)}</td><td>${won(r26)}</td><td style="font-weight:700;color:#c0392b">${won(net)}</td><td class="${yc}">${yoy}</td><td>${won(tgt)}</td><td>${ach}</td>`;
    });
    const sNet=sumS-sumR;const sAch=sumTgt?((sumS/sumTgt)*100).toFixed(1)+'%':'-';
    const sYoy=yoyStr(sumS,sumS25);const syc=yoyClass(sumS,sumS25);
    totals['합계'].s26+=sumS;totals['합계'].r26+=sumR;totals['합계'].s25+=sumS25;totals['합계'].tgt+=sumTgt;
    row+=`<td class="sum-col">${won(sumS)}</td><td class="sum-col">${won(sumR)}</td><td class="sum-col">${won(sNet)}</td><td class="sum-col ${syc}">${sYoy}</td><td class="sum-col">${won(sumTgt)}</td><td class="sum-col">${sAch}</td></tr>`;
    rows+=row;
  });
  let trow=`<tr style="font-weight:700;background:#f0ede8"><td>합계</td>`;
  allPeriods.forEach((p,pi)=>{
    const t=totals[p];const ach=t.tgt?((t.s26/t.tgt)*100).toFixed(1)+'%':'-';
    const yoy=yoyStr(t.s26,t.s25);const yc=yoyClass(t.s26,t.s25);
    const sc=pi===allPeriods.length-1?' class="sum-col"':'';
    trow+=`<td${sc}>${won(t.s26)}</td><td${sc}>${won(t.r26)}</td><td${sc} style="font-weight:700;color:#c0392b">${won(t.s26-t.r26)}</td><td${sc.replace('"','').replace('"','')} class="${(sc?' sum-col ':' ')+yc}">${yoy}</td><td${sc}>${won(t.tgt)}</td><td${sc}>${ach}</td>`;
  });
  trow+=`</tr>`;
  wrap.innerHTML=`<table>${thead}<tbody>${rows}${trow}</tbody></table>`;
}

function s1Charts(){
  const periods=s1Periods();const chs=s1.selChs.length?s1.selChs:CH_NAMES;
  const retLabels=[],retData=[],yoyLabels=[],yoyData=[];
  // 채널별 누적 집계 (선택 기간 합산)
  chs.forEach(ch=>{

function s2GetSrc(ch){
  if(s2.gran==='월별'&&D.month_top15){
    const m=s2.selMon;
    return D.month_top15[m]?D.month_top15[m][ch]||[]:[];
  }
  if(s2.gran==='주차별'&&D.week_top15){
    const w=s2.selWk;
    return D.week_top15[w]?D.week_top15[w][ch]||[]:[];
  }
  return D.ch_top20[ch]||[];
}
function s2GetTop(){
  const map={};
  s2.selChs.forEach(ch=>{
    s2GetSrc(ch).forEach(p=>{
      if(!map[p.code])map[p.code]={code:p.code,item:p.item,name:p.name,season:p.season,s:0,r:0,q:0,rq:0};
      map[p.code].s+=p.s||0;map[p.code].r+=p.r||0;map[p.code].q+=p.q||0;map[p.code].rq+=p.rq||0;
    });
  });
  return Object.values(map).sort((a,b)=>s2.topSort==='수량'?b.q-a.q:b.s-a.s).slice(0,20);

function s2GetRetSrc(ch){
  if(s2.gran==='월별'&&D.month_high_ret){
    const m=s2.selMon;
    return (D.month_high_ret[m]?D.month_high_ret[m][ch]||[]:[]);
  }
  if(s2.gran==='주차별'&&D.week_high_ret){
    const w=s2.selWk;
    return (D.week_high_ret[w]?D.week_high_ret[w][ch]||[]:[]);
  }
  return (D.ch_high_ret[ch]||[]);
}

function s2GetRet(){
  const map={};
  s2.selChs.forEach(ch=>{
    s2GetRetSrc(ch).forEach(p=>{
      if(!map[p.code])map[p.code]={code:p.code,item:p.item||'-',name:p.name,season:p.season,sales:p.s||0,returns:p.r||0,qty:p.q||0,returns_qty:p.rq||0,rr:0};

  return Object.values(map).map(p=>({...p,rr:p.sales?+(p.returns/p.sales*100).toFixed(1):0})).sort((a,b)=>(b.returns_qty-a.returns_qty)||b.returns-a.returns).slice(0,20);
}

function s3_gran(g){s3.gran=g;if(g==='월별')s3.selMonths=[...MONTHS];else if(g==='주차별'){s3.wkMon=CUR_MON;s3.selWeeks=[];}renderTab3();}
function s3PF(){

  else if(g==='주차별'){const wks=D.month_to_weeks[s3.wkMon]||[];el.innerHTML='<div class="filter-row"><span class="filter-label">월:</span>'+MONTHS.map(m=>`<button class="pill ${s3.wkMon===m?'active':''}" onclick="s3_wkMon('${m}')">${m}</button>`).join('')+'</div><div class="filter-row"><span class="filter-label">주차:</span>'+wks.map(w=>`<button class="pill ${s3.selWeeks.includes(w)?'active':''}" onclick="s3_tW('${w}')">${wkLabel(w)}</button>`).join('')+'</div>'; }
  else{el.innerHTML='';}
}
function s3_tM(m){const a=s3.selMonths,i=a.indexOf(m);i>=0?a.splice(i,1):a.push(m);s3PF();s3All();}
function s3_wkMon(m){s3.wkMon=m;s3.selWeeks=[];s3PF();s3All();}
function s3_tW(w){const a=s3.selWeeks,i=a.indexOf(w);i>=0?a.splice(i,1):a.push(w);s3PF();s3All();}
function s3_dyMon(m){s3.dyMon=m;s3.selDays=[];s3PF();s3All();}
function s3_tD(d){const a=s3.selDays,i=a.indexOf(d);i>=0?a.splice(i,1):a.push(d);s3PF();s3All();}
function s3Ps(){
  const g=s3.gran;
  if(g==='월별'){
    const sel=s3.selMonths.length?s3.selMonths:MONTHS;
    return MONTHS.filter(m=>sel.includes(m));
  }
  if(g==='주차별'){
    const sel=s3.selWeeks.length?s3.selWeeks:(D.month_to_weeks[s3.wkMon]||[]);
    return D.weeks.filter(w=>sel.includes(w));
  }
  const sel=s3.selDays.length?s3.selDays:(D.month_to_dates[s3.dyMon]||[]);
  return D.dates.filter(d=>sel.includes(d));
}
function s3S26(p,ch){const g=s3.gran;if(g==='월별')return m26s(p,ch);if(g==='주차별')return sv(D.weekly26[p],ch,'s');return sv(D.daily26[p],ch,'s');}
function s3R26(p,ch){const g=s3.gran;if(g==='월별')return m26r(p,ch);if(g==='주차별')return sv(D.weekly26[p],ch,'r');return sv(D.daily26[p],ch,'r');}

function s3AOV(){
  destroyChart('t3a');const ps=s3Ps();const g=s3.gran;
  const e=document.getElementById('t3a');if(!e)return;
  // AOV 데이터: monthly_aov가 없으면 daily26/monthly26으로 추정
  const mChs=['자사몰','29CM','무신사','무신사글로벌'];
  const getAOV=(p,ch)=>{
    if(g==='월별'){
      if(D.monthly_aov&&D.monthly_aov[p])return D.monthly_aov[p][ch]||null;
      // fallback: 판매금액/주문수 대신 월 매출만 표시
      const v=D.monthly26[p]?D.monthly26[p][ch]||{}:{};
      return (v.s||0)-(v.r||0)||null;
    }
    if(g==='주차별'){
      if(D.weekly_aov&&D.weekly_aov[p])return D.weekly_aov[p][ch]||null;
      const wDates=D.week_to_dates[p]||[];
      let s=0;wDates.forEach(d=>{const v=D.daily26[d]?D.daily26[d][ch]||{}:{};s+=(v.s||0)-(v.r||0);});
      return s||null;
    }
    return null;
  };
  const datasets=mChs.map(ch=>({label:ch,data:ps.map(p=>getAOV(p,ch)),borderColor:CH_COLORS[ch],backgroundColor:CH_COLORS[ch]+'22',tension:.3,pointRadius:3,borderWidth:2,fill:false}));
  const title=D.monthly_aov?'채널별 AOV 추이':'채널별 순매출 추이';
  chartInstances['t3a']=new Chart(e,{type:'line',data:{labels:ps,datasets},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{font:{size:11}}},title:{display:!D.monthly_aov,text:'(AOV 데이터 미포함 — 순매출 기준)',font:{size:10},color:'#999'}},scales:{y:{ticks:{callback:v=>wonShort(v)},grid:{color:'#f0eeec'}},x:{grid:{display:false}}}}});
}

function s3Cat(){
  destroyChart('t3c');const ps=s3Ps();const g=s3.gran;
  const cats={};
  if(g==='주차별'){
    // 주차별: 선택 주차가 속한 월들로 집계
    const selMons=new Set();
    ps.forEach(w=>{Object.keys(D.month_to_weeks||{}).forEach(m=>{if((D.month_to_weeks[m]||[]).includes(w))selMons.add(m);});});
    const mArr=selMons.size?[...selMons]:MONTHS;
    mArr.forEach(m=>Object.keys(D.cat_month).forEach(cat=>{if(!cats[cat])cats[cat]=0;cats[cat]+=D.cat_month[cat][m]||0;}));
  } else {
    // 월별 (기본)
    const mArr=(g==='월별'&&ps.length)?ps:MONTHS;
    mArr.forEach(m=>Object.keys(D.cat_month).forEach(cat=>{if(!cats[cat])cats[cat]=0;cats[cat]+=D.cat_month[cat][m]||0;}));
  }
  const sorted=Object.entries(cats).sort((a,b)=>b[1]-a[1]).slice(0,10);
  const colors=['#2d2926','#8b6f5e','#c4a882','#5c8a6e','#7b9dbf','#d4a520','#a0958c','#b5a99a','#6b8e7a','#9ab0c4'];
  const e=document.getElementById('t3c');if(!e)return;
  const catTotal=sorted.reduce((a,b)=>a+b[1],0);
  const catPctPlugin={
    id:'catPct',
    afterDatasetsDraw(chart){
      const {ctx,data}=chart;
      const meta=chart.getDatasetMeta(0);
      const tot=data.datasets[0].data.reduce((a,b)=>a+(b||0),0);
      meta.data.forEach((arc,i)=>{
        const val=data.datasets[0].data[i]||0;
        const pct=tot?(val/tot*100):0;
        if(pct<4)return;
        const pos=arc.tooltipPosition(false);
        ctx.save();
        ctx.fillStyle='#fff';
        ctx.font='bold 10px sans-serif';
        ctx.textAlign='center';
        ctx.textBaseline='middle';
        ctx.shadowColor='rgba(0,0,0,.3)';ctx.shadowBlur=3;
        // 카테고리명 + %
        const lbl=data.labels[i];
        const shortLbl=lbl.length>4?lbl.slice(0,4):lbl;
        ctx.fillText(shortLbl,pos.x,pos.y-7);
        ctx.fillText(pct.toFixed(1)+'%',pos.x,pos.y+7);
        ctx.restore();
      });
    }
  };
  chartInstances['t3c']=new Chart(e,{
    type:'doughnut',
    data:{labels:sorted.map(e=>e[0]),datasets:[{data:sorted.map(e=>e[1]),backgroundColor:colors,borderWidth:2,borderColor:'#fff'}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{font:{size:10},padding:8}},tooltip:{callbacks:{label:ctx=>{return ' '+won(ctx.raw)+' ('+(catTotal?(ctx.raw/catTotal*100).toFixed(1):0)+')';}}}}},
    plugins:[catPctPlugin]
  });
}

function s3Weekday(){
  destroyChart('t3w');
  const e=document.getElementById('t3w');if(!e)return;
  const dayNames=['월','화','수','목','금','토','일'];
  // weekday26이 없으면 daily26에서 직접 집계
  let totals;
  if(D.weekday26){
    totals=dayNames.map((_,i)=>{
      const wd=D.weekday26[String(i)];
      if(!wd)return 0;
      const s=CH_NAMES.reduce((a,ch)=>a+(wd[ch]?wd[ch].s||0:0),0);
      const cnt=CH_NAMES.reduce((a,ch)=>a+(wd[ch]?wd[ch].cnt||0:0),0);
      return cnt?Math.round(s/cnt):0;
    });
  } else {
    // fallback: daily26에서 요일별 집계 (0=일,1=월,...6=토 → 우리는 월~일 순서)
    const dayMap=[0,0,0,0,0,0,0]; // index 0=월(JS1),1=화(JS2),...6=일(JS0)
    const dayCnt=[0,0,0,0,0,0,0];
    Object.keys(D.daily26).forEach(d=>{
      const jsDay=new Date(d).getDay(); // 0=Sun,1=Mon,...6=Sat
      const idx=jsDay===0?6:jsDay-1;   // 변환: 0=월,6=일
      const net=CH_NAMES.reduce((a,ch)=>{const v=D.daily26[d][ch]||{};return a+(v.s||0)-(v.r||0);},0);
      dayMap[idx]+=net;dayCnt[idx]++;
    });
    totals=dayMap.map((s,i)=>dayCnt[i]?Math.round(s/dayCnt[i]):0);
  }
  const bg=totals.map((_,i)=>i>=5?'#d4a52088':'#8b6f5e88');
  chartInstances['t3w']=new Chart(e,{type:'bar',data:{labels:dayNames,datasets:[{label:'평균 일 매출',data:totals,backgroundColor:bg,borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{ticks:{callback:v=>wonShort(v)},grid:{color:'#f0eeec'}},x:{grid:{display:false}}}}});
}

function s3Best10(){
  const el=document.getElementById('t3best10');

  // 선택된 월 기준 전채널 집계 (month_top15["전체"] 사용)
  const selMons=s3.selMonths&&s3.selMonths.length?s3.selMonths:MONTHS;
  const map={};
  selMons.forEach(mon=>{
    const arr=(D.month_top15&&D.month_top15[mon]&&D.month_top15[mon]['전체'])||[];
    arr.forEach(item=>{
      if(!map[item.code])map[item.code]={code:item.code,name:item.name,item:item.item,season:item.season,s:0,r:0,q:0,rq:0};
      map[item.code].s+=item.s||0;
      map[item.code].r+=item.r||0;
      map[item.code].q+=item.q||0;
      map[item.code].rq+=item.rq||0;
    });
  });

  const periodLabel=selMons.length===MONTHS.length?'전체':selMons.join(', ');
  let items=Object.values(map).sort((a,b)=>b.s-a.s).slice(0,10);

  let rows='';

    const net=p.s-p.r;

    const rankDisp=i<3?`${medals[i]}`:`${i+1}`;
    const itemTag=p.item||'-';

    rows+=`<tr style="${i%2===0?'background:#faf9f7':''}">
      <td style="padding:7px 8px;text-align:center;font-size:13px;${rankStyle}">${rankDisp}</td>
      <td style="padding:7px 8px;font-weight:600;font-size:12px;color:#2d2926;max-width:160px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;" title="${p.name}">${p.name}</td>
      <td style="padding:7px 8px;text-align:center;"><span style="background:${tagColor};border-radius:4px;padding:1px 6px;font-size:10px;font-weight:600;color:#5a4a3a;">${itemTag}</span></td>
      <td style="padding:7px 8px;text-align:right;font-size:12px;font-weight:600;color:#2d2926;">${p.q.toLocaleString()}<span style="font-size:10px;color:#999;">개</span></td>
      <td style="padding:7px 8px;text-align:right;font-size:12px;font-weight:700;color:#c0392b;">${won(net)}</td>
      <td style="padding:7px 8px;text-align:center;font-size:11px;font-weight:600;color:${rrColor};">${rr}%</td>
    </tr>`;
  });

  el.innerHTML=`<div style="font-size:11px;color:#999;margin-bottom:6px;">기준: <span style="color:#2d2926;font-weight:600;">${periodLabel}</span> · 전채널 합산</div>

      <th style="padding:6px 8px;text-align:center;font-size:11px;color:#999;font-weight:600;width:50px;">반품률</th>

function s3Region(){
  const el=document.getElementById('t3rgn-content');

  if(!RD){el.innerHTML='<p style="color:#999;padding:20px;">지역 데이터를 불러올 수 없습니다.</p>';return;}
  const isSido=(s3RgnMode||'sido')==='sido';
  const dataMap=isSido?RD.region_sales:RD.seoul_gu;
  const cntMap=isSido?RD.region_orders:{};
  const totalVal=isSido?RD.region_total:Object.values(RD.seoul_gu||{}).reduce((a,b)=>a+b,0);
  const entries=Object.entries(dataMap||{}).sort((a,b)=>b[1]-a[1]);
  if(!entries.length){el.innerHTML='<p style="color:#999;padding:20px;">데이터 없음</p>';return;}
  const maxVal=entries[0][1]||1;
  const palette=['#2d2926','#4a3f38','#6b5c52','#8b7b72','#a89890','#c4b5ac','#d4c9bc'];
  const fmt=v=>{if(v>=100000000)return (v/100000000).toFixed(1)+'억';if(v>=10000)return Math.round(v/10000)+'만';return v.toLocaleString();};
  const rows=entries.map(([name,val],i)=>{
    const pct=(val/totalVal*100).toFixed(1);
    const barW=Math.min(100,(val/maxVal*100)).toFixed(1);
    const cnt=cntMap[name]?`<span style="color:#aaa;font-size:11px;"> ${cntMap[name]}건</span>`:'';
    const c=palette[Math.min(i,palette.length-1)];
    const medal=i===0?'🥇 ':i===1?'🥈 ':i===2?'🥉 ':'';
    return '<tr style="border-bottom:1px solid #f0eeec">'
      +'<td style="padding:8px 12px;font-size:13px;font-weight:'+(i<3?700:400)+';white-space:nowrap">'+medal+name+'</td>'
      +'<td style="padding:8px 12px"><div style="display:flex;align-items:center;gap:8px">'
      +'<div style="flex:1;height:8px;background:#f0eeec;border-radius:4px;overflow:hidden">'
      +'<div style="width:'+barW+'%;height:100%;background:'+c+';border-radius:4px"></div></div>'
      +'<span style="font-size:12px;font-weight:700;color:'+c+';min-width:38px;text-align:right">'+pct+'%</span>'
      +'</div></td>'
      +'<td style="padding:8px 12px;text-align:right;font-size:13px;font-weight:600">'+fmt(val)+cnt+'</td>'
      +'</tr>';
  }).join('');

  el.innerHTML='<div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;align-items:start">'
    +'<div><table style="width:100%;border-collapse:collapse">'
    +'<thead><tr style="border-bottom:2px solid #d4c9bc">'
    +'<th style="padding:8px 12px;text-align:left;font-size:11px;color:#5a4a3a;font-weight:600">'+(isSido?'시도':'구')+'</th>'
    +'<th style="padding:8px 12px;text-align:left;font-size:11px;color:#5a4a3a;font-weight:600">비중</th>'

// ── 편집 잠금 시스템 ──
const S4_EDIT_PW = '1111';
let s4Unlocked = false;

function s4ToggleLock(){
  if(s4Unlocked){
    s4Unlocked = false;
    s4ApplyLockState();
  } else {
    const pw = prompt('편집 비밀번호를 입력하세요:');
    if(pw === null) return;
    if(pw === S4_EDIT_PW){
      s4Unlocked = true;
      s4ApplyLockState();
    } else {
      alert('비밀번호가 올바르지 않습니다.');
    }
  }
}

function s4ApplyLockState(){
  const bl = document.getElementById('s4-lock-badge');
  const be = document.getElementById('s4-edit-badge');
  const ht = document.getElementById('s4-mode-hint');
  const lb = document.getElementById('s4-lock-btn');
  const sb = document.getElementById('s4-save-btn');
  var tb=document.getElementById('s4-format-toolbar');
  if(s4Unlocked){
    if(bl) bl.style.display='none';
    if(be) be.style.display='';
    if(tb) tb.style.display='flex';
    if(ht) ht.textContent='셀을 클릭해서 수정 후 💾 저장 버튼을 눌러주세요.';
    if(lb){lb.textContent='🔒 편집 잠금';lb.style.background='#c0392b';lb.style.borderColor='#c0392b';}
    if(sb) sb.style.display='';
  } else {
    if(bl) bl.style.display='';
    if(be) be.style.display='none';
    if(tb) tb.style.display='none';
    if(ht) ht.textContent='편집하려면 잠금을 해제하세요.';
    if(lb){lb.textContent='🔓 편집 잠금 해제';lb.style.background='#8b6f5e';lb.style.borderColor='#8b6f5e';}
    if(sb) sb.style.display='none';
  }
  document.querySelectorAll('.s4-editable').forEach(function(el){
    el.contentEditable = s4Unlocked ? 'true' : 'false';
    el.style.cursor = s4Unlocked ? 'text' : 'default';
  });
}

function s4Focus(el){
  if(!s4Unlocked){el.blur();return;}
  el.dataset.prevColor=el.style.color||'';
  el.dataset.prevWeight=el.style.fontWeight||'';
  el.dataset.prevBg=el.style.background||'';
  el.style.outline='2px solid #d4a520';
  el.style.background='#fffef7';
}
function s4SaveCell(el){
  el.style.outline='';
  const idx=parseInt(el.dataset.idx);
  const key=el.dataset.key;
  if(isNaN(idx)||!key)return;
  // 서식 복원
  if(key==='qty_raw'||key==='sales_raw'){
    el.style.color='#c0392b';el.style.fontWeight='700';
    el.style.background='';
  } else {
    el.style.color=el.dataset.prevColor||'';
    el.style.fontWeight=el.dataset.prevWeight||'';
    el.style.background=el.dataset.prevBg||'';
  }
  const val=el.innerHTML.replace(/<div[^>]*>/gi,'').replace(/<\/div>/gi,'\n').replace(/<br\s*\/?>/gi,'\n').trim();
  const clean=el.innerText.trim();
  if(key==='qty_raw'){
    const num=parseInt(clean.replace(/[^0-9]/g,''));
    PROMO_DATA[idx].qty=isNaN(num)?null:num;
  } else if(key==='tgt_raw'){
    const num=parseInt(clean.replace(/[^0-9]/g,''));
    PROMO_DATA[idx].tgt=isNaN(num)?null:num;
  } else if(key==='sales_raw'){
    const num=parseInt(clean.replace(/[^0-9]/g,''));
    PROMO_DATA[idx].sales=isNaN(num)?null:num;
  } else {
    PROMO_DATA[idx][key]=el.innerHTML;
  }
  s4TrackEditFromCell(idx,key,el);
}
function s4SaveAch(el){
  el.style.outline='';el.style.background='';
  el.style.fontWeight='700';
  const idx=parseInt(el.dataset.idx);
  const clean=el.innerText.trim().replace('%','');
  const num=parseFloat(clean);
  PROMO_DATA[idx].ach=isNaN(num)?null:num;
  // 달성률 색상 업데이트
  const achColor=PROMO_DATA[idx].ach===null?'#999':PROMO_DATA[idx].ach>=100?'#1e7a4a':PROMO_DATA[idx].ach>=70?'#d4830a':'#c0392b';
  el.style.color=achColor;el.style.fontWeight='700';
  s4TrackEdit(idx,'ach',PROMO_DATA[idx].ach);
}
// ── Sparse 편집 저장 시스템 ──
var s4UserEdits={};
function s4TrackEdit(idx,key,val){
  if(!s4UserEdits[idx])s4UserEdits[idx]={};
  s4UserEdits[idx][key]=val;
}
function s4TrackEditFromCell(idx,key,el){
  var realKey=key==='qty_raw'?'qty':key==='tgt_raw'?'tgt':key==='sales_raw'?'sales':key;
  var val=PROMO_DATA[idx][realKey];
  s4TrackEdit(idx,realKey,val);

var s4ActiveIdx=-1, s4ActiveCell=null, s4ActiveSavedSel=null;
function s4SetActive(el){
  s4ActiveIdx=parseInt(el.dataset.idx||-1);
  s4ActiveCell=el;
  var h=document.getElementById('s4-active-hint');
  if(h&&s4ActiveIdx>=0){
    var p=PROMO_DATA[s4ActiveIdx];
    h.textContent=p?(p.name.substring(0,12)+'... 행 선택됨'):'행 선택됨';
  }
}
function s4SaveSel(){
  var sel=window.getSelection();
  if(sel&&sel.rangeCount>0)s4ActiveSavedSel=sel.getRangeAt(0).cloneRange();
}
function s4RestoreSel(){
  if(!s4ActiveSavedSel)return;
  try{var sel=window.getSelection();sel.removeAllRanges();sel.addRange(s4ActiveSavedSel);}catch(e){}
}
function s4RowAbove(){
  if(s4ActiveIdx<0){alert('셀을 먼저 클릭하세요.');return;}
  var p=PROMO_DATA[s4ActiveIdx];if(!p)return;
  var nr={mon:p.mon,ch:p.ch,ch_tgt:p.ch_tgt||0,name:'새 프로모션',tgt:0,period:'',qty:null,sales:0,ach:null,parsed:{sm:0,sd:0,em:0,ed:0},scheme_h:'',ad_h:'',review_h:'',memo:'',highlight:false};
  PROMO_DATA.splice(s4ActiveIdx,0,nr);s4ActiveIdx=-1;s4ActiveCell=null;
  s4SaveFullPromo();s4Render();
  var h=document.getElementById('s4-active-hint');if(h)h.textContent='셀을 클릭해서 행 선택';
}
function s4RowBelow(){
  if(s4ActiveIdx<0){alert('셀을 먼저 클릭하세요.');return;}
  s4InsertRowBelow(s4ActiveIdx);s4ActiveIdx=-1;s4ActiveCell=null;
  var h=document.getElementById('s4-active-hint');if(h)h.textContent='셀을 클릭해서 행 선택';
}
function s4RowDelete(){
  if(s4ActiveIdx<0){alert('셀을 먼저 클릭하세요.');return;}
  if(!confirm('이 행을 삭제하시겠습니까?'))return;
  PROMO_DATA.splice(s4ActiveIdx,1);s4ActiveIdx=-1;s4ActiveCell=null;
  s4SaveFullPromo();s4Render();
}

  s4RestoreSel();
  document.execCommand('bold');
  if(s4ActiveCell)s4AutoSaveCell(s4ActiveCell);
}
function s4FmtAlign(dir){
  if(!s4ActiveCell)return;
  var cmds={'left':'justifyLeft','center':'justifyCenter','right':'justifyRight'};
  s4RestoreSel();
  document.execCommand(cmds[dir]||'justifyCenter');

function s4FmtColorToggle(e){

  p.style.display=(p.style.display==='none'||p.style.display==='')?'block':'none';

}
function s4FmtColor(c){
  s4RestoreSel();
  document.execCommand('foreColor',false,c);
  document.getElementById('s4-color-palette').style.display='none';
  if(s4ActiveCell)s4AutoSaveCell(s4ActiveCell);

function s4AutoSaveCell(el){
  var idx=parseInt(el.dataset.idx);var key=el.dataset.key;
  if(isNaN(idx)||!key)return;
  PROMO_DATA[idx][key]=el.innerHTML;
  s4TrackEdit(idx,key,el.innerHTML);
}

function s4AddRow(ch){
  var mon=s4.mon;
  var chTgt=0;
  var chEntry=PROMO_DATA.find(function(p){return p.ch===ch&&p.mon===mon;});
  if(chEntry)chTgt=chEntry.ch_tgt||0;
  var newRow={mon:mon,ch:ch,ch_tgt:chTgt,name:'새 프로모션',tgt:0,period:'',qty:null,sales:0,ach:null,parsed:{sm:0,sd:0,em:0,ed:0},scheme_h:'',ad_h:'',review_h:'',memo:'',highlight:false};
  PROMO_DATA.push(newRow);

  setTimeout(function(){

function s4InsertRowBelow(idx){

  var newRow={mon:p.mon,ch:p.ch,ch_tgt:p.ch_tgt||0,name:'새 프로모션',tgt:0,period:'',qty:null,sales:0,ach:null,parsed:{sm:0,sd:0,em:0,ed:0},scheme_h:'',ad_h:'',review_h:'',memo:'',highlight:false};
  PROMO_DATA.splice(idx+1,0,newRow);
  s4SaveFullPromo();
  s4Render();
}
function s4DeleteRow(idx){
  if(!confirm('이 행을 삭제하시겠습니까?'))return;
  PROMO_DATA.splice(idx,1);
  s4SaveFullPromo();
  s4Render();
}
function s4SaveFullPromo(){
  try{localStorage.setItem('sinoon_promo_data',JSON.stringify(PROMO_DATA));}catch(e){}
}
function s4LoadFullPromo(){
  try{
    var saved=localStorage.getItem('sinoon_promo_data');
    if(saved){
      var arr=JSON.parse(saved);
      PROMO_DATA.length=0;
      arr.forEach(function(r){PROMO_DATA.push(r);});
      return true;
    }
  }catch(e){}
  return false;
}

function mktLoad(){
  try{
    var b=localStorage.getItem('sinoon_mkt_budget');
    var w=localStorage.getItem('sinoon_mkt_weekly');
    var r=localStorage.getItem('sinoon_mkt_review');
    var sp=localStorage.getItem('sinoon_mkt_spend');
    var tg=localStorage.getItem('sinoon_mkt_target');
    var st=localStorage.getItem('sinoon_mkt_spend_total');
    MKT_BUDGET=b?JSON.parse(b):JSON.parse(JSON.stringify(MKT_DEFAULT_BUDGET));
    MKT_WEEKLY=w?JSON.parse(w):JSON.parse(JSON.stringify(MKT_DEFAULT_WEEKLY));
    MKT_SPEND=sp?JSON.parse(sp):JSON.parse(JSON.stringify(MKT_DEFAULT_SPEND));
    if(tg)MKT_TARGET=JSON.parse(tg);
    if(st)MKT_SPEND_TOTAL=JSON.parse(st);
    if(r)MKT_REVIEW=JSON.parse(r);
    var dr=localStorage.getItem('sinoon_mkt_daily_report');
    if(dr)MKT_DAILY_REPORT=JSON.parse(dr);
    var dt=localStorage.getItem('sinoon_mkt_daily_table');
    if(dt)MKT_DAILY_TABLE=JSON.parse(dt);
  }catch(e){
    MKT_BUDGET=JSON.parse(JSON.stringify(MKT_DEFAULT_BUDGET));
    MKT_WEEKLY=JSON.parse(JSON.stringify(MKT_DEFAULT_WEEKLY));
    MKT_SPEND=JSON.parse(JSON.stringify(MKT_DEFAULT_SPEND));
  }
}

function mktSaveAll(){
  // DOM에서 최신 내용 먼저 수집
  mktSaveReview();
  mktSaveDailyReport();
  // localStorage 저장
  localStorage.setItem('sinoon_mkt_budget',JSON.stringify(MKT_BUDGET));
  localStorage.setItem('sinoon_mkt_spend',JSON.stringify(MKT_SPEND));
  localStorage.setItem('sinoon_mkt_target',JSON.stringify(MKT_TARGET));
  localStorage.setItem('sinoon_mkt_spend_total',JSON.stringify(MKT_SPEND_TOTAL));
  localStorage.setItem('sinoon_mkt_weekly',JSON.stringify(MKT_WEEKLY));
  localStorage.setItem('sinoon_mkt_review',JSON.stringify(MKT_REVIEW));
  localStorage.setItem('sinoon_mkt_daily_report',JSON.stringify(MKT_DAILY_REPORT));
  localStorage.setItem('sinoon_mkt_daily_table',JSON.stringify(MKT_DAILY_TABLE));
  // 토스트: 저장 중 표시
  var t=document.getElementById('mkt-save-toast');
  if(t){t.textContent='⏳ 클라우드 동기화 중...';t.style.background='#5a6a7a';t.style.opacity='1';t.style.display='';}
  // JSONBin 클라우드 동기화 (직접 처리해서 결과 표시)
  var keys=['sinoon_promo_memos','sinoon_promo_data','sinoon_s4_sparse_edits',
    'sinoon_mkt_budget','sinoon_mkt_spend','sinoon_mkt_target','sinoon_mkt_spend_total',
    'sinoon_mkt_weekly','sinoon_mkt_review','sinoon_mkt_daily_report','sinoon_mkt_daily_table'];
  var d={};
  keys.forEach(function(k){var v=localStorage.getItem(k);if(v)d[k]=v;});
  fetch(JSONBIN_URL,{
    method:'PUT',
    headers:{'Content-Type':'application/json','X-Master-Key':JSONBIN_API_KEY,'X-Bin-Versioning':'false'},
    body:JSON.stringify(d)
  }).then(function(r){
    if(t){
      if(r.ok){
        t.textContent='✅ 저장 완료 (클라우드 동기화됨)';t.style.background='#2d6a4f';
      }else{
        t.textContent='⚠️ 로컬 저장만 됨 (클라우드 오류 '+r.status+')';t.style.background='#c0392b';
      }
      t.style.opacity='1';
      setTimeout(function(){t.style.opacity='0';setTimeout(function(){t.style.display='none';t.textContent='✅ 저장 완료 (클라우드 동기화됨)';t.style.background='#2d6a4f';},400);},2500);
    }
  }).catch(function(e){
    if(t){
      t.textContent='⚠️ 네트워크 오류 - 로컬만 저장됨';t.style.background='#c0392b';
      t.style.opacity='1';
      setTimeout(function(){t.style.opacity='0';setTimeout(function(){t.style.display='none';t.textContent='✅ 저장 완료 (클라우드 동기화됨)';t.style.background='#2d6a4f';},400);},2500);
    }
  });
}

function mktToggleLock(){
  if(mktUnlocked){
    mktUnlocked=false;mktApplyLockState();
  }else{
    var pw=prompt('편집 비밀번호를 입력하세요:');
    if(pw===null)return;
    if(pw===MKT_EDIT_PW){mktUnlocked=true;mktApplyLockState();}
    else alert('비밀번호가 올바르지 않습니다.');
  }
}
function mktApplyLockState(){
  var bl=document.getElementById('mkt-lock-badge');
  var be=document.getElementById('mkt-edit-badge');
  var ht=document.getElementById('mkt-mode-hint');
  var lb=document.getElementById('mkt-lock-btn');
  var sb=document.getElementById('mkt-save-btn');
  var tb=document.getElementById('mkt-format-toolbar');
  var rev=document.getElementById('mkt-review-area');
  if(mktUnlocked){
    if(bl)bl.style.display='none';
    if(be)be.style.display='';
    if(tb)tb.style.display='flex';
    if(ht)ht.textContent='셀을 클릭해서 수정 후 💾 저장 버튼을 눌러주세요.';
    if(lb){lb.textContent='🔒 편집 잠금';lb.style.background='#c0392b';lb.style.borderColor='#c0392b';}
    if(sb)sb.style.display='';
    if(rev){rev.contentEditable='true';rev.style.background='#fffde7';}
    var dr=document.getElementById('mkt-daily-report-area');
    if(dr){dr.contentEditable='true';dr.style.background='#fffde7';}
  }else{
    if(bl)bl.style.display='';
    if(be)be.style.display='none';
    if(tb)tb.style.display='none';
    if(ht)ht.textContent='편집하려면 잠금을 해제하세요.';
    if(lb){lb.textContent='🔓 편집 잠금 해제';lb.style.background='#8b6f5e';lb.style.borderColor='#8b6f5e';}
    if(sb)sb.style.display='none';
    if(rev){rev.contentEditable='false';rev.style.background='#fafafa';}
    var dr=document.getElementById('mkt-daily-report-area');
    if(dr){dr.contentEditable='false';dr.style.background='#fafafa';}
  }
  document.querySelectorAll('.mkt-editable').forEach(function(el){
    el.contentEditable=mktUnlocked?'true':'false';
    el.style.cursor=mktUnlocked?'text':'default';
  });
}
function mktSaveSel(){
  var sel=window.getSelection();
  if(sel&&sel.rangeCount>0)mktSavedSel=sel.getRangeAt(0).cloneRange();
}
function mktRestoreSel(){
  if(!mktSavedSel)return;
  try{var sel=window.getSelection();sel.removeAllRanges();sel.addRange(mktSavedSel);}catch(e){}
}
function mktFmtBold(){
  mktRestoreSel();document.execCommand('bold');
  if(mktActiveCell)mktAutoSave(mktActiveCell);
}
function mktFmtAlign(dir){
  if(!mktActiveCell)return;
  var cmds={left:'justifyLeft',center:'justifyCenter',right:'justifyRight'};
  mktRestoreSel();document.execCommand(cmds[dir]||'justifyCenter');
  if(mktActiveCell)mktAutoSave(mktActiveCell);
}
function mktFmtColorToggle(e){
  var p=document.getElementById('mkt-color-palette');
  if(!p)return;
  p.style.display=(p.style.display==='none'||!p.style.display)?'block':'none';
  if(e)e.stopPropagation();
}
function mktFmtColor(c){
  mktRestoreSel();document.execCommand('foreColor',false,c);
  var p=document.getElementById('mkt-color-palette');
  if(p)p.style.display='none';
  if(mktActiveCell)mktAutoSave(mktActiveCell);
}
function mktAutoSave(el){
  var type=el.dataset.type;if(!type)return;
  if(type==='budget'){
    var ch=el.dataset.ch,mon=el.dataset.mon;
    var v=parseInt(el.innerText.trim().replace(/[^0-9]/g,''))||0;
    if(!MKT_BUDGET[ch])MKT_BUDGET[ch]={};MKT_BUDGET[ch][mon]=v;
  }else if(type==='target'){
    MKT_TARGET[el.dataset.mon]=parseInt(el.innerText.trim().replace(/[^0-9]/g,''))||0;
  }else if(type==='spend_total'){
    MKT_SPEND_TOTAL[el.dataset.mon]=parseInt(el.innerText.trim().replace(/[^0-9]/g,''))||0;
  }else if(type==='weekly'){
    var v=parseInt(el.innerText.trim().replace(/[^0-9]/g,''))||0;
    if(!MKT_WEEKLY[el.dataset.mon])MKT_WEEKLY[el.dataset.mon]={};
    if(!MKT_WEEKLY[el.dataset.mon][el.dataset.wk])MKT_WEEKLY[el.dataset.mon][el.dataset.wk]={};
    MKT_WEEKLY[el.dataset.mon][el.dataset.wk][el.dataset.key]=v;
  }else if(type==='review'){
    if(!MKT_REVIEW)MKT_REVIEW={};MKT_REVIEW[el.dataset.mon]=el.innerHTML;
  }
}

function mktCellSave(el){
  var type=el.dataset.type;
  var raw=el.innerText.trim().replace(/,/g,'').replace(/원/g,'');
  var val=parseInt(raw)||0;
  if(type==='budget'){
    var ch=el.dataset.ch,mon=el.dataset.mon;
    if(!MKT_BUDGET[ch])MKT_BUDGET[ch]={};
    MKT_BUDGET[ch][mon]=val;
    var rowTotal=MKT_MONS.reduce(function(a,m){return a+((MKT_BUDGET[ch]||{})[m]||0);},0);
    var rowEl=document.getElementById('mkt-brow-'+ch);
    if(rowEl)rowEl.textContent=rowTotal?rowTotal.toLocaleString('ko-KR'):'';
    var colTotal=MKT_CHS.reduce(function(a,c){return a+((MKT_BUDGET[c]||{})[mon]||0);},0);
    var colEl=document.getElementById('mkt-bcol-'+mon);
    if(colEl)colEl.textContent=colTotal?colTotal.toLocaleString('ko-KR'):'';
    var grand=MKT_CHS.reduce(function(a,c){return a+MKT_MONS.reduce(function(b,m){return b+((MKT_BUDGET[c]||{})[m]||0);},0);},0);
    var grandEl=document.getElementById('mkt-bgrand');
    if(grandEl)grandEl.textContent=grand?grand.toLocaleString('ko-KR'):'';
  } else if(type==='target'){
    var tmon=el.dataset.mon;
    if(!MKT_TARGET)MKT_TARGET={};
    MKT_TARGET[tmon]=val;
    // 비중 업데이트
    var bColEl=document.getElementById('mkt-bcol-'+tmon);
    var budgetV=bColEl?parseInt(bColEl.textContent.replace(/,/g,''))||0:0;
    var ratioEl=document.getElementById('mkt-ratio-'+tmon);
    if(ratioEl)ratioEl.textContent=val?(budgetV/val*100).toFixed(1)+'%':'';
  } else if(type==='spend_total'){
    var smon=el.dataset.mon;
    if(!MKT_SPEND_TOTAL)MKT_SPEND_TOTAL={};
    MKT_SPEND_TOTAL[smon]=val;
  } else if(type==='weekly'){
    var mon2=el.dataset.mon,wk=el.dataset.wk,key=el.dataset.key;
    if(!MKT_WEEKLY[mon2])MKT_WEEKLY[mon2]={};
    if(!MKT_WEEKLY[mon2][wk])MKT_WEEKLY[mon2][wk]={};
    MKT_WEEKLY[mon2][wk][key]=val;
    mktUpdateWeeklyTotals(mon2,wk);
  }

  var taEl=document.getElementById('mkt-wtotal-ach');
  if(tbEl)tbEl.textContent=totalBudget?totalBudget.toLocaleString('ko-KR'):'';

  if(taEl){

function mktDailyCellSave(el){
  var mon=el.dataset.mon,row=el.dataset.row,key=el.dataset.key;
  if(!mon||!row||!key)return;
  var val=el.innerText.trim();
  if(!MKT_DAILY_TABLE[mon])MKT_DAILY_TABLE[mon]={};
  if(!MKT_DAILY_TABLE[mon][row])MKT_DAILY_TABLE[mon][row]={};
  MKT_DAILY_TABLE[mon][row][key]=val;
  // 전일대비 행 자동 색상
  if(row==='vsprev'){
    if(val.startsWith('▼')){el.style.color='#e91e63';el.style.fontWeight='600';}
    else if(val.startsWith('▲')){el.style.color='#1565c0';el.style.fontWeight='600';}
    else{el.style.color='';el.style.fontWeight='';}
  }
  try{localStorage.setItem('sinoon_mkt_daily_table',JSON.stringify(MKT_DAILY_TABLE));}catch(e){}

function mktHandleDragover(e){
  e.preventDefault();
  e.dataTransfer.dropEffect='copy';
  var el=e.currentTarget;
  el.style.outline='2px dashed #1a1a2e';
}
function mktHandleDragleave(e){
  e.currentTarget.style.outline='';
}
function mktHandleDrop(e,el){
  e.preventDefault();
  el.style.outline='';
  if(!mktUnlocked){return;}
  var files=e.dataTransfer.files;
  var items=e.dataTransfer.items;
  // 이미지 파일 처리
  if(files&&files.length){
    Array.from(files).forEach(function(file){
      if(!file.type.startsWith('image/'))return;
      var reader=new FileReader();
      reader.onload=function(ev){
        el.focus();
        var html='<img src="'+ev.target.result+'" style="max-width:100%;height:auto;border-radius:6px;margin:6px 0;display:block;box-shadow:0 2px 8px #0001;">';
        document.execCommand('insertHTML',false,html);
        if(el.id==='mkt-daily-report-area')mktSaveDailyReport();
        else if(el.id==='mkt-review-area')mktSaveReview();
      };
      reader.readAsDataURL(file);
    });
    return;
  }
  // 클립보드에서 이미지 (브라우저 내 드래그)
  if(items){
    Array.from(items).forEach(function(item){
      if(item.kind==='file'&&item.type.startsWith('image/')){
        var file=item.getAsFile();
        var reader=new FileReader();
        reader.onload=function(ev){
          el.focus();
          var html='<img src="'+ev.target.result+'" style="max-width:100%;height:auto;border-radius:6px;margin:6px 0;display:block;box-shadow:0 2px 8px #0001;">';
          document.execCommand('insertHTML',false,html);
          if(el.id==='mkt-daily-report-area')mktSaveDailyReport();
          else if(el.id==='mkt-review-area')mktSaveReview();
        };
        reader.readAsDataURL(file);
      }
    });
  }
}

});
document.addEventListener('focusin',function(e){

});

});
